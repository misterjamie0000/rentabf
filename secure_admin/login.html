<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Admin Login — Rent a Boyfriend</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --rose-50: #fff1f2;
      --rose-100: #ffe4e6;
      --rose-200: #fecdd3;
      --rose-500: #f43f5e;
      --rose-600: #e11d48;
      --rose-700: #be123c;
      --rose-950: #4c0519;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-display: 'Playfair Display', Georgia, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, #fff0f3 0%, #ffe4e6 50%, #fdf2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Floating ambient circles for premium feel */
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      z-index: 0;
      filter: blur(80px);
      opacity: 0.5;
    }
    body::before {
      top: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(244, 63, 94, 0.2), transparent 70%);
    }
    body::after {
      bottom: -10%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(251, 113, 133, 0.15), transparent 70%);
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 30px;
      padding: 48px 36px;
      box-shadow: 0 20px 50px rgba(244, 63, 94, 0.08), 
                  0 4px 12px rgba(0, 0, 0, 0.02),
                  inset 0 1px 0 rgba(255, 255, 255, 0.6);
      transform: translateY(0);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--rose-700) 0%, var(--rose-500) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--rose-600);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .form-group {
      margin-bottom: 22px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--rose-950);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      font-size: 0.95rem;
      font-family: var(--font-body);
      color: #1f2937;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(244, 63, 94, 0.2);
      border-radius: 14px;
      outline: none;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .form-control:focus {
      border-color: var(--rose-500);
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.1), 
                  inset 0 1px 2px rgba(0, 0, 0, 0.01);
    }

    .btn-login {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--rose-600) 0%, var(--rose-500) 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(244, 63, 94, 0.25);
    }

    .btn-login:hover {
      background: linear-gradient(135deg, var(--rose-700) 0%, var(--rose-600) 100%);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(244, 63, 94, 0.3);
    }

    .btn-login:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(244, 63, 94, 0.2);
    }

    .btn-login:disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .login-error {
      background: #fff5f5;
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
      color: #dc2626;
      font-size: 0.85rem;
      margin-bottom: 20px;
      display: none;
      line-height: 1.4;
      animation: shake 0.4s ease;
    }

    .login-error.show {
      display: block;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--rose-600);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .back-link a:hover {
      color: var(--rose-700);
      text-decoration: underline;
    }

    /* iOS Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="login-logo">🔐 Admin Access</div>
    <div class="login-subtitle">Rent a Boyfriend</div>
  </div>

  <div class="login-error" id="loginError" role="alert"></div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label class="form-label" for="adminUsername">Username</label>
      <input
        type="text"
        class="form-control"
        id="adminUsername"
        placeholder="Enter username"
        required
        autocomplete="username"
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="adminPassword">Password</label>
      <input
        type="password"
        class="form-control"
        id="adminPassword"
        placeholder="Enter password"
        required
        autocomplete="current-password"
      >
    </div>

    <button type="submit" class="btn-login" id="loginBtn">
      <span id="btnText">Login to Dashboard</span>
      <span class="spinner" id="btnSpinner" style="display:none;"></span>
    </button>
  </form>

  <div class="back-link">
    <a href="/">← Return to Website</a>
  </div>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const loginBtn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  const btnSpinner = document.getElementById('btnSpinner');

  loginForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    loginError.classList.remove('show');

    const username = document.getElementById('adminUsername').value.trim();
    const password = document.getElementById('adminPassword').value;

    if (!username || !password) {
      showError('Please enter both username and password.');
      return;
    }

    // Disable button and show spinner
    loginBtn.disabled = true;
    btnText.textContent = 'Verifying...';
    btnSpinner.style.display = 'inline-block';

    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.success) {
        // Success: redirect back to admin route which will now serve dashboard.html
        window.location.href = '/adminnandufleet';
      } else {
        showError(data.message || 'Invalid username or password.');
        resetButton();
      }
    } catch (err) {
      showError('Unable to connect to the server. Please try again.');
      resetButton();
    }
  });

  function showError(msg) {
    loginError.textContent = msg;
    loginError.classList.add('show');
  }

  function resetButton() {
    loginBtn.disabled = false;
    btnText.textContent = 'Login to Dashboard';
    btnSpinner.style.display = 'none';
  }
</script>
</body>
</html>
